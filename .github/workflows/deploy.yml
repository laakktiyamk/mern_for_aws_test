name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ] # Pipeline käynnistyy, kun pushataan main-branchiin

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Haetaan koodi GitHubista
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Kirjaudutaan Docker Hubiin käyttäen GitHub Secrets -avaimia
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 3. Rakennetaan Docker-kontti ja pushataan se Docker Hubiin
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        # Korvaa 'express-kokeilu' haluamallasi kontin nimellä
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/express-kokeilu:latest
