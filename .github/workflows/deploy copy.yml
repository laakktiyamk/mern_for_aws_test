name: Build, Push and Deploy MERN App

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/express-kokeilu:latest

  # === UUSI AUTOMAATTINEN KÄYTTÖÖNOTTOVAIHE ===
  deploy:
    runs-on: ubuntu-latest
    needs: build # Tämä vaihe käynnistyy vasta, kun build-vaihe on valmis

    steps:
    - name: Executing remote ssh commands to deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # 1. Pysäytetään vanha kontti jos se on käynnissä (|| true estää kaatumisen jos konttia ei löydy)
          docker stop express-kokeilu || true
          
          # 2. Poistetaan vanha kontti
          docker rm express-kokeilu || true
          
          # 3. Ladattataan uusin konttiversio Docker Hubista palvelimelle
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/express-kokeilu:latest
          
          # 4. Käynnistetään uusi kontti taustalle porttiin 80
          docker run -d -p 80:8080 --name express-kokeilu ${{ secrets.DOCKERHUB_USERNAME }}/express-kokeilu:latest
          
          # 5. Siivotaan vanhat turhat imaget tilaa viemästä
          docker image prune -f
